apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpa-worker
  labels:
    app: rpa-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rpa-worker
  template:
    metadata:
      name: rpa-worker
      labels:
        app: rpa-worker
    spec:
      serviceAccountName: secrets-reader
      containers:
        - name: rpa-worker
          image: ghcr.io/camunda/rpa-worker@999_DIGEST_999
          imagePullPolicy: IfNotPresent
          env:
            - name: CAMUNDA_CLIENT_ZEEBE_ENABLED
              value: "false"
            - name: CAMUNDA_RPA_SECRETS_BACKEND
              value: "k8s"
            - name: CAMUNDA_RPA_SECRETS_K8S_SECRETS
              value: "test-secret@secrets-test"
          startupProbe:
            httpGet:
              port: worker-api
              path: /actuator/health
            failureThreshold: 10
            periodSeconds: 15
          ports:
            - containerPort: 36227
              protocol: TCP
              name: worker-api
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: rpa-worker
spec:
  selector:
    app: rpa-worker
  ports:
    - protocol: TCP
      port: 36228
      targetPort: worker-api
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-reader
rules:
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "get", "watch", "list" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secrets-reader
subjects:
  - kind: ServiceAccount
    name: secrets-reader
    namespace: rpa-worker
roleRef:
  kind: Role
  name: secrets-reader
  apiGroup: rbac.authorization.k8s.io
  