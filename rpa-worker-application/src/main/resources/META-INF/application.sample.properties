## Camunda RPA Worker
## Full properties reference: https://github.com/camunda/rpa-worker?tab=readme-ov-file#configuration-reference

### General Configuration
#camunda.rpa.zeebe.worker-tags=default
#camunda.rpa.robot.default-timeout=PT5M
#camunda.rpa.robot.fail-fast=true
#camunda.rpa.python.extra-requirements=/path/to/extra-requirements.txt

### Zeebe Configuration

#### For all connection methods
#camunda.client.enabled=true

#### SaaS Production
#camunda.client.mode=saas                           #} 
#camunda.client.auth.client-id=<client id>          #} Replace with autogenerated properties
#camunda.client.auth.client-secret=<client secret>  #} from Console
#camunda.client.cloud.cluster-id=<cluster id>       #} 
#camunda.client.cloud.region=<region>               #} 

##### Secrets Configuration
#camunda.rpa.secrets.backend=camunda

#### Self-Managed Configuration
##### Kubernetes
#camunda.client.mode=selfmanaged
#camunda.client.auth.method=oidc
#camunda.client.auth.client-id=<client id>
#camunda.client.auth.client-secret=<client secret>
#camunda.client.auth.issuer-url=https://camunda/auth/realms/camunda-platform
#camunda.client.grpc-address=https://zeebe.camunda
#camunda.client.rest-address=https://${camunda.client.cloud.region}.zeebe.dev.ultrawombat.com/${camunda.client.cloud.cluster-id}

##### Camunda 8 Run 8.7
#camunda.rpa.zeebe.auth-method=cookie
#camunda.client.auth.client-id=demo
#camunda.client.auth.client-secret=demo
#camunda.client.grpc-address=http://localhost:26500
#camunda.client.rest-address=http://localhost:8080

##### Camunda 8 Run 8.8 - No Auth (Default)
#camunda.rpa.zeebe.auth-method=none
#camunda.client.grpc-address=http://localhost:26500
#camunda.client.rest-address=http://localhost:8080

##### Camunda 8 Run 8.8 - With Auth
#camunda.rpa.zeebe.auth-method=basic
#camunda.client.auth.client-id=demo
#camunda.client.auth.client-secret=demo
#camunda.client.zeebe.grpc-address=http://localhost:26500
#camunda.client.zeebe.rest-address=http://localhost:8080

##### Docker Compose (with authentication (e.g. from docker-compose-full.yaml))
#camunda.client.mode=selfmanaged
#camunda.client.auth.method=oidc
#camunda.client.auth.client-id=orchestration
#camunda.client.auth.client-secret=secret
#camunda.client.auth.issuer-url=http://localhost:18080/auth/realms/camunda-platform
#camunda.client.auth.audience=zeebe-api
#camunda.client.rest-address=http://localhost:8088
#camunda.client.grpc-address=http://localhost:26500

### Prometheus Push Gateway Configuration
#management.prometheus.metrics.export.pushgateway.enabled=true
#management.prometheus.metrics.export.pushgateway.base-url=http://pushgateway.prometheus:9091
